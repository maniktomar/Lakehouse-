# ── YAML anchor for shared Airflow config (must be at top level, NOT inside services:) ──
x-airflow-common:
  &airflow-common
  build:
    context: ..
    dockerfile: docker/airflow.Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    # Regenerate for production: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'lakehouse-dev-only-not-for-production'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
  volumes:
    - ../dags:/opt/airflow/dags
    - ../logs/airflow:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    airflow-postgres:
      condition: service_healthy

# ── Services ───────────────────────────────────────────────────────────────────
services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin12345}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-admin12345}; do sleep 2; done;
      mc mb --ignore-existing local/warehouse;
      mc anonymous set none local/warehouse;
      exit 0;
      "

  nessie:
    image: ghcr.io/projectnessie/nessie:0.102.5
    environment:
      QUARKUS_HTTP_PORT: 19120
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
    ports:
      - "19120:19120"

  spark:
    build:
      context: ..
      dockerfile: docker/spark.Dockerfile
    depends_on:
      minio-init:
        condition: service_completed_successfully
      nessie:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-admin12345}
      AWS_REGION: ${MINIO_REGION:-us-east-1}
      NESSIE_URI: ${NESSIE_URI:-http://nessie:19120/api/v2}
      ICEBERG_WAREHOUSE: ${ICEBERG_WAREHOUSE:-s3://warehouse}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      PYTHONPATH: /opt/lakehouse
    volumes:
      - ..:/opt/lakehouse
    working_dir: /opt/lakehouse
    command: ["sleep", "infinity"]
    ports:
      - "4040:4040"

  trino:
    image: trinodb/trino:475
    depends_on:
      minio-init:
        condition: service_completed_successfully
      nessie:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ../trino/catalog:/etc/trino/catalog
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-admin12345}

  # ── Streamlit Dashboard ──────────────────────────────────────────────────────
  streamlit:
    build:
      context: ..
      dockerfile: docker/streamlit.Dockerfile
    ports:
      - "8501:8501"
    environment:
      TRINO_HOST: trino
      TRINO_PORT: "8080"
    depends_on:
      - trino
    restart: unless-stopped

  # ── Airflow metadata database ────────────────────────────────────────────────
  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: migrate DB and create admin user, then exits
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash          # bypass Airflow entrypoint wrapper
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@lakehouse.local \
          --password admin
    restart: "no"

  # Airflow web UI — http://localhost:8082  (admin / admin)
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # Airflow scheduler — executes DAG tasks via LocalExecutor
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  minio-data:
  airflow-postgres-data:
